<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Router — Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #f8f9fa;
      color: #1a1a1a;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .id {
      font-family: ui-monospace, monospace;
      font-size: 0.9rem;
      color: #555;
    }
    label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 0.25rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .qr-link {
      font-size: 0.8rem;
      color: #0066cc;
      word-break: break-all;
    }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    button {
      padding: 0.5rem 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    button.danger { color: #c00; border-color: #c00; }
    button.small { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    .toolbar { margin-bottom: 1rem; }
    .status { font-size: 0.85rem; color: #666; margin-top: 0.75rem; }
    .login-box {
      max-width: 320px;
      margin: 4rem auto;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
    }
    .login-box h1 { margin-bottom: 1rem; }
    .login-error { color: #c00; font-size: 0.85rem; min-height: 1.25rem; }
    .save-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .save-box .hint { font-size: 0.8rem; color: #888; margin: 0.25rem 0 0.5rem; }
  </style>
  <script src="./admin-secrets.js"></script>
</head>
<body>
  <div id="login-screen" class="login-box" hidden>
    <h1>QR Router</h1>
    <label for="login-password">Password</label>
    <input type="password" id="login-password" autocomplete="current-password">
    <p class="login-error" id="login-error"></p>
    <button type="button" class="primary" id="login-btn">Sign in</button>
  </div>

  <div id="app" hidden>
    <h1>QR Router</h1>
    <div id="list"></div>
    <div class="actions toolbar">
      <button type="button" id="add">+ New QR</button>
      <button type="button" id="download">Download links.json</button>
      <button type="button" id="logout">Sign out</button>
    </div>
    <div class="save-box">
      <label for="token">GitHub token (repo access)</label>
      <input type="password" id="token" placeholder="ghp_…" autocomplete="off">
      <p class="hint">Stays in this tab only. <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">Create a token</a> with repo scope.</p>
      <button type="button" class="primary" id="save">Save to GitHub</button>
    </div>
    <p class="status" id="status"></p>
  </div>

  <script>
    const AUTH_KEY = "qr-admin-auth";
    const TOKEN_KEY = "qr-admin-token";
    const CHARS = "abcdefghijklmnopqrstuvwxyz0123456789";
    const pathSegments = location.pathname.split("/").filter(Boolean);
    const repoBase = (location.hostname.endsWith(".github.io") && pathSegments.length > 0)
      ? "/" + pathSegments[0]
      : "";
    const baseUrl = location.origin + repoBase;
    const repo = pathSegments[0] || "";
    const owner = location.hostname.split(".")[0];

    let links = {};
    let fileSha = null;

    async function hashPassword(password) {
      const data = new TextEncoder().encode(password);
      const buf = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(buf), b => b.toString(16).padStart(2, "0")).join("");
    }

    function isAuthed() {
      return sessionStorage.getItem(AUTH_KEY) === window.ADMIN_PASSWORD_HASH;
    }

    function showLogin(msg) {
      document.getElementById("app").hidden = true;
      const login = document.getElementById("login-screen");
      login.hidden = false;
      document.getElementById("login-error").textContent = msg || "";
    }

    function showApp() {
      document.getElementById("login-screen").hidden = true;
      document.getElementById("app").hidden = false;
      const savedToken = sessionStorage.getItem(TOKEN_KEY);
      if (savedToken) document.getElementById("token").value = savedToken;
    }

    async function tryLogin() {
      if (!window.ADMIN_PASSWORD_HASH) {
        document.getElementById("login-error").textContent =
          "Admin password not configured on this deploy. Set ADMIN_PASSWORD in GitHub → Settings → Secrets → Actions, switch Pages source to GitHub Actions, then redeploy.";
        return;
      }

      const password = document.getElementById("login-password").value;
      const hash = await hashPassword(password);

      if (hash !== window.ADMIN_PASSWORD_HASH) {
        document.getElementById("login-error").textContent = "Wrong password.";
        return;
      }

      sessionStorage.setItem(AUTH_KEY, hash);
      showApp();
      load();
    }

    function logout() {
      sessionStorage.removeItem(AUTH_KEY);
      document.getElementById("login-password").value = "";
      showLogin();
    }

    function genId() {
      let id;
      do {
        id = Array.from({ length: 6 }, () => CHARS[Math.floor(Math.random() * CHARS.length)]).join("");
      } while (links[id]);
      return id;
    }

    function normalize(entry) {
      if (typeof entry === "string") return { url: entry, description: "" };
      return { url: entry.url || "", description: entry.description || "" };
    }

    function setStatus(msg, ok = true) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.style.color = ok ? "#666" : "#c00";
    }

    function render() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      for (const [id, raw] of Object.entries(links)) {
        const entry = normalize(raw);
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-header">
            <span class="id">${id}</span>
            <button type="button" class="small danger" data-delete="${id}">Delete</button>
          </div>
          <label>Description</label>
          <input type="text" data-id="${id}" data-field="description" value="${escapeAttr(entry.description)}" placeholder="e.g. Business card sticker">
          <label>Destination URL</label>
          <input type="url" data-id="${id}" data-field="url" value="${escapeAttr(entry.url)}" placeholder="https://">
          <div class="qr-link">${baseUrl}/${id}</div>
          <button type="button" class="small" data-copy="${baseUrl}/${id}">Copy QR URL</button>
        `;
        list.appendChild(card);
      }

      list.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", () => {
          const id = input.dataset.id;
          const field = input.dataset.field;
          links[id] = normalize(links[id]);
          links[id][field] = input.value;
        });
      });

      list.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (confirm(`Delete ${btn.dataset.delete}?`)) {
            delete links[btn.dataset.delete];
            render();
          }
        });
      });

      list.querySelectorAll("[data-copy]").forEach(btn => {
        btn.addEventListener("click", () => {
          navigator.clipboard.writeText(btn.dataset.copy);
          setStatus("Copied QR URL.");
        });
      });
    }

    function escapeAttr(str) {
      return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    function toJson() {
      const out = {};
      for (const [id, raw] of Object.entries(links)) {
        const entry = normalize(raw);
        out[id] = { url: entry.url, description: entry.description };
      }
      return JSON.stringify(out, null, 2) + "\n";
    }

    async function load() {
      try {
        const res = await fetch(baseUrl + "/links.json?t=" + Date.now());
        links = await res.json();
        render();
        setStatus("Loaded.");
      } catch {
        setStatus("Could not load links.json.", false);
      }
    }

    document.getElementById("login-btn").addEventListener("click", tryLogin);
    document.getElementById("login-password").addEventListener("keydown", e => {
      if (e.key === "Enter") tryLogin();
    });
    document.getElementById("logout").addEventListener("click", logout);

    document.getElementById("add").addEventListener("click", () => {
      const id = genId();
      links[id] = { url: "", description: "" };
      render();
      setStatus(`Created ${id}.`);
    });

    document.getElementById("download").addEventListener("click", () => {
      const blob = new Blob([toJson()], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "links.json";
      a.click();
      setStatus("Downloaded links.json.");
    });

    document.getElementById("token").addEventListener("input", e => {
      sessionStorage.setItem(TOKEN_KEY, e.target.value);
    });

    document.getElementById("save").addEventListener("click", async () => {
      const token = document.getElementById("token").value.trim();
      if (!token) {
        setStatus("Paste your GitHub token first.", false);
        return;
      }
      if (!repo || !owner) {
        setStatus("Could not detect repo from URL.", false);
        return;
      }

      setStatus("Saving…");

      try {
        const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents/links.json`;
        const getRes = await fetch(apiBase, {
          headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" }
        });

        if (getRes.ok) {
          fileSha = (await getRes.json()).sha;
        } else if (getRes.status !== 404) {
          const err = await getRes.json();
          throw new Error(err.message || getRes.statusText);
        }

        const body = {
          message: "Update links.json via admin",
          content: btoa(unescape(encodeURIComponent(toJson()))),
          branch: "main"
        };
        if (fileSha) body.sha = fileSha;

        const putRes = await fetch(apiBase, {
          method: "PUT",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        if (!putRes.ok) {
          const err = await putRes.json();
          throw new Error(err.message || putRes.statusText);
        }

        fileSha = (await putRes.json()).content.sha;
        setStatus("Saved to GitHub. Live in ~1 min.");
      } catch (e) {
        setStatus("Save failed: " + e.message, false);
      }
    });

    if (isAuthed()) {
      showApp();
      load();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
